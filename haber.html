<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Process Simulation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>The Haber Process</h1>
        <nav><a href="index.html" class="back-to-home">Back to Home</a></nav>
    </header>
    <main>
        <p>Explore Le Chatelier's Principle in the industrial production of ammonia: N₂(g) + 3H₂(g) ⇌ 2NH₃(g) + Heat.</p>
        
        <div class="input-container">
            <div class="input-group">
                <label for="temp-slider">Temperature (°C): <span id="temp-val">450</span></label>
                <input id="temp-slider" type="range" min="100" max="800" value="450" step="10">
            </div>
            <div class="input-group">
                <label for="pressure-slider">Pressure (atm): <span id="pressure-val">200</span></label>
                <input id="pressure-slider" type="range" min="1" max="1000" value="200" step="10">
            </div>
            <div class="input-group">
                <label for="remove-nh3">NH₃ Removal System:</label>
                <select id="remove-nh3">
                    <option value="off">Off (Closed System)</option>
                    <option value="on" selected>On (Continuous Removal)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h3>Yield of Ammonia (NH₃) %</h3>
            <canvas id="yieldChart" width="800" height="400"></canvas>
            <p id="result-text" style="text-align: center; margin-top: 15px; color: var(--accent-success);"></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 Equilibrium Constant Simulator</p>
    </footer>
    <script src="haber.js"></script>
</body>
</html>
